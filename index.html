<!DOCTYPE html>
<html>
<head>
    <title>Simple Attendance System</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="logo-container">
    <img src="mylogo.jpg" alt="Logo">
</div>

<h1> CEC Event Attendance System</h1>

<div class="form-container">
    <h3>Student Form</h3>
    
    <input type="text" id="name" placeholder=" Enter Name"><br>
    <input type="text" id="dept" placeholder=" Enter Department"><br>
    <input type="text" id="id" placeholder=" Enter Student ID"><br>

    <button onclick="submitData()">Submit</button>
    <p id="message"></p>
</div>

<h2> Attendance Table </h2>

<table id="table">
    <tr>
        <th>Name</th>
        <th>Department</th>
        <th>Student ID</th>
    </tr>
</table>

<script src="script.js"></script>

</body>
</html>
